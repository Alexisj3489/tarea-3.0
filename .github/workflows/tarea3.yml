name: tarea3.0

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/alexisj3489/proyecto-backend
  FRONTEND_IMAGE: ghcr.io/alexisj3489/proyecto-frontend
  IMAGE_TAG: 3.0.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ env.BACKEND_IMAGE }}
      frontend_image: ${{ env.FRONTEND_IMAGE }}
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verificar que el backend instala sus dependencias
        run: |
          pip install -r backend/requirements.txt
          python -c "import fastapi, sqlalchemy, psycopg2; print('OK: dependencias del backend importan correctamente')"

      - name: Login hacia GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u alexisj3489 --password-stdin

      - name: Construir y publicar imagen del backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} ./backend
          docker push ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Construir y publicar imagen del frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Generar .env con los secrets (no se imprime en el log)
        run: |
          cat > .env <<EOF
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          BACKEND_IMAGE=${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE=${{ needs.build-and-push.outputs.frontend_image }}
          IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
          EOF

      - name: Probar conexion SSH al VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "conexion ssh exitosa"
            mkdir -p /root/landigb

      - name: Copiar stack.yml, Makefile y .env al VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml,Makefile,.env"
          target: "/root/landigb"

      - name: Desplegar servicios en Docker Swarm
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            # 1. Entramos a la ruta absoluta correcta del usuario root
            cd /root/landigb
            
            # 2. Autenticación con el Container Registry
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u alexisj3489 --password-stdin
            
            # 3. Verificación ESTRICTA de Docker Swarm (Evita el falso positivo de 'inactive')
            if [ "$(docker info --format '{{.Swarm.LocalNodeState}}')" != "active" ]; then
              echo "Swarm no está activo. Inicializando..."
              docker swarm init
            else
              echo "Swarm ya se encuentra activo como Manager."
            fi
            
            # 4. Descargar las imágenes actualizadas
            docker pull ${{ needs.build-and-push.outputs.backend_image }}:${{ needs.build-and-push.outputs.image_tag }}
            docker pull ${{ needs.build-and-push.outputs.frontend_image }}:${{ needs.build-and-push.outputs.image_tag }}
            
            # 5. Lectura segura del entorno y ejecución de Docker Swarm
            set -a; . ./.env; set +a
            docker stack deploy -c stack.yml appstack --with-registry-auth
            rm -f .env