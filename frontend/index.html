<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Alexis</title>
    <!-- Tailwind CSS desde CDN para un diseño profesional -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuración inyectada dinámicamente -->
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen">
    <header class="bg-indigo-600 text-white shadow-md py-4 px-6 mb-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-wide">Panel de Administración</h1>
            <p class="text-sm bg-indigo-700 px-3 py-1.5 rounded-full font-mono">Alexis - stack.yml</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-12">
        <!-- Navegación de Pestañas (Tabs) -->
        <div class="border-b border-gray-200 mb-8">
            <nav class="flex space-x-8" aria-label="Tabs">
                <button id="tab-users" class="border-indigo-500 text-indigo-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-lg focus:outline-none transition-all">
                    👥 Gestión de Usuarios
                </button>
                <button id="tab-products" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-lg focus:outline-none transition-all">
                    📦 Gestión de Productos
                </button>
            </nav>
        </div>

        <!-- ========================================== -->
        <!-- SECCIÓN DE USUARIOS -->
        <!-- ========================================== -->
        <section id="section-users" class="block">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Formulario Usuarios -->
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h3 id="form-user-title" class="text-xl font-semibold mb-6 text-gray-800">Crear Nuevo Usuario</h3>
                    <form id="form-user" class="space-y-4">
                        <input type="hidden" id="user-id">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                            <input type="text" id="user-name" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="user-email" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button type="submit" id="btn-user-submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 transition duration-150 font-medium">
                                Guardar
                            </button>
                            <button type="button" id="btn-user-cancel" class="hidden w-full bg-gray-100 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-200 transition duration-150 font-medium">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Tabla de Usuarios -->
                <div class="lg:col-span-2 bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="text-xl font-semibold text-gray-800">Listado de Usuarios</h3>
                        <span id="user-count" class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0 Usuarios</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body" class="bg-white divide-y divide-gray-200">
                                <!-- Cargado dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========================================== -->
        <!-- SECCIÓN DE PRODUCTOS -->
        <!-- ========================================== -->
        <section id="section-products" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Formulario Productos -->
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h3 id="form-product-title" class="text-xl font-semibold mb-6 text-gray-800">Crear Nuevo Producto</h3>
                    <form id="form-product" class="space-y-4">
                        <input type="hidden" id="product-id">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Producto</label>
                            <input type="text" id="product-name" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Precio ($)</label>
                                <input type="number" step="0.01" id="product-price" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Stock</label>
                                <input type="number" id="product-stock" required class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500">
                            </div>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button type="submit" id="btn-product-submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 transition duration-150 font-medium">
                                Guardar
                            </button>
                            <button type="button" id="btn-product-cancel" class="hidden w-full bg-gray-100 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-200 transition duration-150 font-medium">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Tabla de Productos -->
                <div class="lg:col-span-2 bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="text-xl font-semibold text-gray-800">Listado de Productos</h3>
                        <span id="product-count" class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0 Productos</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Precio</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stock</th>
                                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="products-table-body" class="bg-white divide-y divide-gray-200">
                                <!-- Cargado dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
