version: "3.9"

networks:
  web:
    driver: overlay
    attachable: true
  backend-net:
    driver: overlay
    internal: true

volumes:
  traefik-letsencrypt:
  portainer-data:

services:

  # ---------------------------------------------------------------------
  # Traefik: Proxy Inverso + SSL Certificados automáticos
  # ---------------------------------------------------------------------
  traefik:
    image: traefik:v3.1
    command:
      - "--providers.swarm=true"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.network=web"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=dustin.paredes@example.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-letsencrypt:/letsencrypt"
    networks:
      - web
    deploy:
      placement:
        constraints: [ "node.role == manager" ]
      restart_policy:
        condition: on-failure

  # ---------------------------------------------------------------------
  # Portainer CE: Panel de control visual
  # ---------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:2.21.4
    command: "-H unix:///var/run/docker.sock"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer-data:/data"
    networks:
      - web
    deploy:
      placement:
        constraints: [ "node.role == manager" ]
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=web"
        - "traefik.http.routers.portainer.rule=Host(`portainerdustin.byronrm.com`)"
        - "traefik.http.routers.portainer.entrypoints=websecure"
        - "traefik.http.routers.portainer.tls.certresolver=le"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  # ---------------------------------------------------------------------
  # Backend: API (Conexión directa a BD externa en la Web)
  # ---------------------------------------------------------------------
  backend:
    image: ghcr.io/alexisj3489/proyecto-backend:3.0.0
    environment:
      # REEMPLAZA ESTOS VALORES CON LOS DE TU BASE DE DATOS EN LA WEB:
      DB_CONNECTION: "pgsql"
      DB_HOST: "URL_DE_TU_BASE_DE_DATOS_EXTERNA.com" 
      DB_PORT: "5432"
      DB_DATABASE: "NOMBRE_DE_TU_BD_EN_LA_WEB"
      DB_USERNAME: "USUARIO_DE_TU_BD_EN_LA_WEB"
      DB_PASSWORD: "CONTRASEÑA_DE_TU_BD_EN_LA_WEB"
      
      APP_URL: "https://backdustin.byronrm.com"
      FRONTEND_URL: "https://dustin.byronrm.com"
    networks:
      - web
      - backend-net
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=web"
        - "traefik.http.routers.backend.rule=Host(`backdustin.byronrm.com`)"
        - "traefik.http.routers.backend.entrypoints=websecure"
        - "traefik.http.routers.backend.tls.certresolver=le"
        - "traefik.http.services.backend.loadbalancer.server.port=8000"
      restart_policy:
        condition: on-failure

  # ---------------------------------------------------------------------
  # Frontend: Aplicación Web Next.js
  # ---------------------------------------------------------------------
  frontend:
    image: ghcr.io/alexisj3489/proyecto-frontend:3.0.0
    environment:
      NEXT_PUBLIC_API_URL: "https://backdustin.byronrm.com/api"
      NODE_ENV: "production"
    networks:
      - web
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=web"
        - "traefik.http.routers.frontend.rule=Host(`dustin.byronrm.com`)"
        - "traefik.http.routers.frontend.entrypoints=websecure"
        - "traefik.http.routers.frontend.tls.certresolver=le"
        - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      restart_policy:
        condition: on-failure