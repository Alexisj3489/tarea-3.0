version: "3.9"

networks:
  web:
    driver: overlay
    attachable: true
  backend-net:
    driver: overlay
    internal: true

volumes:
  traefik-letsencrypt:
  portainer-data:
  db-data:

services:

  # ---------------------------------------------------------------------
  # Traefik: Proxy Inverso + SSL Certificados automáticos
  # ---------------------------------------------------------------------
  traefik:
    image: traefik:v3.1
    command:
      - "--providers.swarm=true"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.network=web"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=alexis.coronel@byronrm.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-letsencrypt:/letsencrypt"
    networks:
      - web
    deploy:
      placement:
        constraints: [ "node.role == manager" ]
      restart_policy:
        condition: on-failure

  # ---------------------------------------------------------------------
  # Portainer CE: Panel de control visual
  # ---------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:2.21.4
    command: "-H unix:///var/run/docker.sock"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer-data:/data"
    networks:
      - web
    deploy:
      placement:
        constraints: [ "node.role == manager" ]
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=web"
        - "traefik.http.routers.portainer.rule=Host(`portainai.byronrm.com`)" # Mapeado
        - "traefik.http.routers.portainer.entrypoints=websecure"
        - "traefik.http.routers.portainer.tls.certresolver=le"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  # ---------------------------------------------------------------------
  # PostgreSQL: Base de datos interna
  # ---------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "appuser"
      POSTGRES_PASSWORD: "12345" # Clave asignada
      POSTGRES_DB: "appdb"
    volumes:
      - "db-data:/var/lib/postgresql/data"
    networks:
      - backend-net
    deploy:
      placement:
        constraints: [ "node.role == manager" ]
      restart_policy:
        condition: on-failure

  # ---------------------------------------------------------------------
  # pgAdmin: Administrador gráfico web para la base de datos
  # ---------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@byronrm.com"
      PGADMIN_DEFAULT_PASSWORD: "12345" # Clave asignada para el login web
      PGADMIN_CONFIG_SERVER_MODE: "True"
    networks:
      - web
      - backend-net
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=web"
        - "traefik.http.routers.pgadmin.rule=Host(`pgpacheco.byronrm.com`)" # Mapeado
        - "traefik.http.routers.pgadmin.entrypoints=websecure"
        - "traefik.http.routers.pgadmin.tls.certresolver=le"
        - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

  # ---------------------------------------------------------------------
  # Backend: API Python FastAPI
  # ---------------------------------------------------------------------
  backend:
    image: ghcr.io/alexisj3489/proyecto-backend:3.0.0
    environment:
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_USER: "appuser"
      DB_PASSWORD: "12345" # Clave asignada para conectar a la BD
      DB_NAME: "appdb"
      CORS_ORIGINS: "https://coronel.byronrm.com" # ¡CORREGIDO!
    networks:
      - web
      - backend-net
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=web"
        - "traefik.http.routers.backend.rule=Host(`backalexis.byronrm.com`)" # Mapeado
        - "traefik.http.routers.backend.entrypoints=websecure"
        - "traefik.http.routers.backend.tls.certresolver=le"
        - "traefik.http.services.backend.loadbalancer.server.port=8000"
      restart_policy:
        condition: on-failure

  # ---------------------------------------------------------------------
  # Frontend: Aplicación Web Next.js
  # ---------------------------------------------------------------------
  frontend:
    image: ghcr.io/alexisj3489/proyecto-frontend:3.0.0
    environment:
      NEXT_PUBLIC_API_URL: "https://backalexis.byronrm.com/api"
      NODE_ENV: "production"
    networks:
      - web
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=web"
        - "traefik.http.routers.frontend.rule=Host(`coronel.byronrm.com`)" # ¡CORREGIDO!
        - "traefik.http.routers.frontend.entrypoints=websecure"
        - "traefik.http.routers.frontend.tls.certresolver=le"
        - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      restart_policy:
        condition: on-failure